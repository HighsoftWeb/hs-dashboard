name: CI
on:
  push:
    branches: [master]
  pull_request:
    branches: [master, dev]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "yarn"
      - run: yarn install --frozen-lockfile
      - run: yarn lint

  format:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "yarn"
      - run: yarn install --frozen-lockfile
      - run: yarn format:check

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "yarn"
      - run: yarn install --frozen-lockfile
      - run: yarn test:coverage
        env:
          JWT_SECRET: test-secret-key-for-ci-minimum-32-characters
          JWT_EXPIRES_IN: 1h
          REFRESH_TOKEN_EXPIRES_IN: 7d
          DEFAULT_COD_EMPRESA: 1
          LOG_LEVEL: error

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "yarn"
      - run: yarn install --frozen-lockfile
      - run: yarn build
        env:
          JWT_SECRET: test-secret-key-for-build-minimum-32-characters
          JWT_EXPIRES_IN: 1h
          REFRESH_TOKEN_EXPIRES_IN: 7d
          DEFAULT_COD_EMPRESA: 1

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "yarn"
      - run: yarn install --frozen-lockfile
      - name: Run npm audit
        run: yarn audit --audit-level=moderate
        continue-on-error: true
