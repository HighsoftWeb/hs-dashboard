services:
  hs-dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hs-dashboard
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - JWT_SECRET=${JWT_SECRET}
      - DEFAULT_COD_EMPRESA=${DEFAULT_COD_EMPRESA:-1}
    volumes:
      - hs-dashboard-data:/app/.data
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:3000', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - hs-network

volumes:
  hs-dashboard-data:
    driver: local
    name: hs-dashboard-data

networks:
  hs-network:
    driver: bridge
